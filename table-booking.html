<section style="padding-top:130px; padding-bottom:60px; background: linear-gradient(rgba(10,14,26,0.85), rgba(10,14,26,0.95)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1920&q=80') center/cover; text-align:center; border-bottom:1px solid rgba(201,168,76,0.15);">
    <h1 class="display-xl" style="color:var(--ivory);">Book a <em style="color:var(--gold);">Table</em></h1>
</section>

<section class="section-pad" style="background:var(--navy);">
    <div class="container" style="max-width:800px; margin: 0 auto;">
        <div style="background:var(--navy-card); border:1px solid rgba(201,168,76,0.15); border-radius:var(--radius-lg); padding: 3rem;">
            <div id="booking-alert" class="hidden" style="margin-bottom:1.5rem;"></div>
            
            <style>
                .t-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; background:rgba(10,14,26,0.5); padding:2rem; border-radius:12px; border:1px solid rgba(201,168,76,0.15); margin-bottom:2rem; }
                .t-item { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; background:var(--navy-card); border:1.5px solid rgba(201,168,76,0.2); border-radius:12px; cursor:pointer; transition:var(--transition); position:relative; }
                .t-item:hover { border-color:rgba(201,168,76,0.6); background:rgba(201,168,76,0.05); }
                .t-item.active { border-color:var(--gold); background:rgba(201,168,76,0.15); box-shadow:0 0 15px rgba(201,168,76,0.2); }
                .t-surface { width:70px; height:70px; border-radius:50%; background:#1a1208; border:3px solid var(--gold); display:flex; align-items:center; justify-content:center; color:var(--gold); font-weight:bold; font-family:var(--font-serif); font-size:1.2rem; }
                .t-chair { width:20px; height:8px; background:var(--text-muted); border-radius:4px; position:absolute; }
            </style>

            <form id="tableBookingForm" style="display:flex; flex-direction:column; gap:1.4rem;">
                <input type="hidden" name="csrf_token" value="41872f63dafc2b654ee01b7b9b2ca9cc0c356cd20bf3a8555dc3d0139babe2d2">
                <input type="hidden" name="table_number" id="hiddenTableInput" required value="">

                <label class="label-luxury" style="text-align:center; font-size:1.1rem; color:var(--ivory);">Live 2D Table Selection</label>
                <div class="t-grid">
                                        <div class="t-item" onclick="selectTable(1, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T1</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                        <div class="t-item" onclick="selectTable(2, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T2</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                        <div class="t-item" onclick="selectTable(3, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T3</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                        <div class="t-item" onclick="selectTable(4, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T4</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                        <div class="t-item" onclick="selectTable(5, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T5</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                        <div class="t-item" onclick="selectTable(6, this)">
                        <div class="t-chair" style="top:10px;"></div>
                        <div class="t-chair" style="bottom:10px;"></div>
                        <div class="t-surface">T6</div>
                        <div style="margin-top:0.8rem; font-size:0.75rem; color:var(--text-muted);">2-4 Guests</div>
                    </div>
                                    </div>
                
                <script>
                    function selectTable(num, el) {
                        document.querySelectorAll('.t-item').forEach(i => i.classList.remove('active'));
                        el.classList.add('active');
                        document.getElementById('hiddenTableInput').value = `Table ${num}`;
                    }
                </script>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div><label class="label-luxury">Full Name</label><input type="text" name="full_name" required class="input-luxury" value=""></div>
                    <div><label class="label-luxury">Email Address</label><input type="email" name="email" required class="input-luxury" value=""></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div><label class="label-luxury">Phone</label><input type="tel" name="phone" required class="input-luxury" value=""></div>
                    <div><label class="label-luxury">Guests</label><input type="number" name="guests" min="1" required class="input-luxury" placeholder="e.g. 2"></div>
                </div>

                <label class="label-luxury">Branch Location</label>
                <select name="branch" required class="input-luxury">
                    <option value="" disabled selected>Select a branch</option>
                    <option value="Symphony Downtown">Symphony Downtown (City Center)</option>
                    <option value="Symphony Oceanfront">Symphony Oceanfront (Marina Bay)</option>
                    <option value="Symphony Heights">Symphony Heights (Rooftop)</option>
                </select>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div><label class="label-luxury">Date</label><input type="date" name="date" required class="input-luxury" min="2026-03-27"></div>
                    <div>
                        <label class="label-luxury">Time</label>
                        <select name="time" required class="input-luxury">
                            <option value="18:00">6:00 PM</option>
                            <option value="19:00">7:00 PM</option>
                            <option value="20:00">8:00 PM</option>
                        </select>
                    </div>
                </div>

                <label class="label-luxury">Special Requests</label>
                <textarea name="requests" rows="3" class="input-luxury"></textarea>

                <button type="submit" id="submitBtn" class="btn-gold" style="width:100%; justify-content:center; padding:1.1rem; margin-top:0.5rem;">Confirm Reservation</button>
            </form>
        </div>
    </div>
</section>

<div id="successModal" style="display:none; position:fixed; inset:0; background:rgba(10,14,26,0.85); z-index:500; align-items:center; justify-content:center;">
    <div style="background:var(--navy-card); padding:3rem; text-align:center; border-radius:24px;">
        <h2 style="color:var(--ivory);">Booking Confirmed</h2>
        <p id="successMsg" style="color:var(--text-muted);"></p>
        <a href="index.html" class="btn-gold">Return Home</a>
    </div>
</div>

<script>
document.getElementById('tableBookingForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn    = document.getElementById('submitBtn');
    const alert  = document.getElementById('booking-alert');
    btn.textContent = 'Processing'; btn.disabled = true; alert.className = 'hidden';
    
    try {
        const fd  = new FormData(this);
        const res = await fetch('backend/process_booking.html', { method: 'POST', body: fd });
        const dat = await res.json();
        if (dat.status === 'success') {
            document.getElementById('successMsg').textContent = dat.message;
            document.getElementById('successModal').style.display = 'flex';
        } else {
            alert.className = 'alert-error'; alert.textContent = dat.message; alert.classList.remove('hidden');
        }
    } catch (err) {
        alert.className = 'alert-error'; alert.textContent = 'Network error.'; alert.classList.remove('hidden');
    }
    btn.textContent = 'Confirm Reservation'; btn.disabled = false;
});
</script>
</body></html>
